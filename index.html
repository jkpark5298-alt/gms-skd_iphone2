<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="에어제타" />
  <title>에어제타 - 멀티 병합</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root{
      --bg:#f8fafc; --card:#ffffff; --ink:#0f172a; --muted:#475569; --line:#e2e8f0;
      --brand:#0f172a; --brand2:#1d4ed8; --ok:#166534; --warn:#92400e; --err:#b91c1c;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Apple SD Gothic Neo,"Noto Sans KR",sans-serif}
    .wrap{max-width:860px;margin:0 auto;padding:20px 16px 40px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 8px 24px rgba(15,23,42,.06);margin-bottom:16px}
    h1{font-size:28px;margin:0 0 8px}
    h2{font-size:18px;margin:0 0 12px}
    p,li{line-height:1.55}
    .sub{color:var(--muted);margin:0}
    .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .btn{appearance:none;border:none;background:var(--brand2);color:#fff;padding:14px 16px;border-radius:12px;font-weight:700;cursor:pointer; width: 100%;}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    input[type=file]{width:100%;padding:12px;border:1px dashed var(--line);border-radius:12px;background:#fff; margin-bottom: 10px;}
    .log{white-space:pre-wrap;background:#0b1220;color:#dbeafe;border-radius:12px;padding:14px;min-height:160px;font-size:13px; max-height: 300px; overflow-y: auto;}
    .tag{display:inline-block;padding:5px 10px;border-radius:999px;background:#e0ecff;color:#1e40af;font-size:12px;font-weight:700}
    .small{font-size:13px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <span class="tag">에어제타 전용</span>
      <h1>통합 파일 변환기</h1>
      <p class="sub">여러 파일을 수정 시간 순으로 정렬 후 <b>하나의 엑셀</b>로 합칩니다.</p>
    </div>

    <div class="card">
      <h2>파일 선택 (다중 선택 가능)</h2>
      <input id="fileInput" type="file" accept=".xlsx,.xls,.xml,.xma" multiple />
      <button id="runBtn" class="btn">병합 후 다운로드</button>
      <p class="small" style="margin-top:10px;">※ 파일 선택 시 여러 개를 드래그하거나 Shift를 누르고 선택하세요.</p>
    </div>

    <div class="card">
      <h2>처리 로그</h2>
      <div id="log" class="log">준비 완료</div>
    </div>
  </div>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));
    }

    const logEl = document.getElementById('log');
    const fileInput = document.getElementById('fileInput');
    const runBtn = document.getElementById('runBtn');

    function log(msg){ logEl.textContent += "\n" + msg; logEl.scrollTop = logEl.scrollHeight; }
    function resetLog(){ logEl.textContent = "작업 시작..."; }

    function normalizeHeader(v){
      return String(v ?? '').replace(/[\r\n\t]+/g, ' ').replace(/\s+/g,'').replace(/[()\-_.]/g,'').trim().toUpperCase();
    }

    function isNonEmpty(v){ return v !== undefined && v !== null && String(v).trim() !== ''; }

    function findHeaderRow(rows, maxCheck=15){
      for(let r=0; r<Math.min(rows.length, maxCheck); r++){
        const row = (rows[r] || []).map(normalizeHeader);
        if(row.some(h => h.includes('ETD') || h.includes('ETA'))) return r;
      }
      return 0;
    }

    function findColumn(headers, aliases){
      const norm = headers.map(normalizeHeader);
      for(const alias of aliases){
        const a = normalizeHeader(alias);
        let idx = norm.findIndex(h => h === a);
        if(idx !== -1) return idx;
      }
      return -1;
    }

    function parseSortableDate(v){
      if(!isNonEmpty(v)) return null;
      if(v instanceof Date) return v;
      if(typeof v === 'number'){
        const epoch = new Date(Date.UTC(1899,11,30));
        return new Date(epoch.getTime() + v * 86400000);
      }
      const d = new Date(v);
      return isNaN(d.getTime()) ? null : d;
    }

    async function extractData(file) {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type:'array', cellDates:true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

      const headerIdx = findHeaderRow(rows);
      const headers = rows[headerIdx] || [];
      
      const idxEtd = findColumn(headers, ['ETD/ETA','ETDETA']);
      const idxROLD = findColumn(headers, ['R/O L/D','ROLD']);
      const idxTORI = findColumn(headers, ['T/O R/I','TORI']);
      const idxSTD = findColumn(headers, ['STD']);
      const idxSTA = findColumn(headers, ['STA']);

      if(idxEtd === -1 || idxROLD === -1) throw new Error(`${file.name}: 필수 열을 찾을 수 없음`);

      let body = rows.slice(headerIdx + 1).filter(r => Array.isArray(r) && r.some(v => isNonEmpty(v)));
      
      if(idxTORI !== -1){
        body = body.filter(r => !(isNonEmpty(r[idxEtd]) && isNonEmpty(r[idxROLD]) && isNonEmpty(r[idxTORI])));
      }

      body.sort((a,b) => (parseSortableDate(a[idxEtd]) || 0) - (parseSortableDate(b[idxEtd]) || 0));

      const removeSet = new Set([idxSTD, idxSTA].filter(v => v !== -1));
      const filteredHeaders = headers.filter((_, i) => !removeSet.has(i));
      const filteredBody = body.map(row => row.filter((_, i) => !removeSet.has(i)));

      return { body: filteredBody, headers: filteredHeaders, roldIdxInFiltered: filteredHeaders.indexOf(headers[idxROLD]) };
    }

    runBtn.addEventListener('click', async () => {
      const files = fileInput.files;
      if(files.length === 0) return alert('파일을 선택해주세요.');

      try {
        runBtn.disabled = true;
        resetLog();

        const sortedFiles = Array.from(files).sort((a, b) => a.lastModified - b.lastModified);
        log(`총 ${sortedFiles.length}개 파일 감지 (수정 시간순 정렬 완료)`);

        let mergedBody = [];
        let finalHeaders = [];
        let roldIdx = -1;

        for (const file of sortedFiles) {
          log(`처리 중: ${file.name}...`);
          const result = await extractData(file);
          if (finalHeaders.length === 0) {
            finalHeaders = result.headers;
            roldIdx = result.roldIdxInFiltered;
          }
          mergedBody.push(...result.body);
        }

        for (let i = 0; i < mergedBody.length; i++) {
          if (roldIdx !== -1) mergedBody[i][roldIdx] = (i % 2 === 0) ? 'A' : 'B';
        }

        const now = new Date();
        const dateStr = now.toISOString().split('T')[0];
        const outRows = [
          [`에어제타 통합 리포트 (${dateStr})`],
          [],
          finalHeaders,
          ...mergedBody
        ];

        const outWb = XLSX.utils.book_new();
        const outWs = XLSX.utils.aoa_to_sheet(outRows);
        XLSX.utils.book_append_sheet(outWb, outWs, '통합데이터');
        
        const fileName = `에어제타_통합_${dateStr}.xlsx`;
        XLSX.writeFile(outWb, fileName);
        
        log(`\n✅ 모든 공정 완료!`);
        log(`병합된 총 행수: ${mergedBody.length}행`);
        log(`다운로드 파일: ${fileName}`);

      } catch (err) {
        log(`❌ 오류: ${err.message}`);
        console.error(err);
      } finally {
        runBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
